name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      run_checks:
        description: "Run lint, tests, typecheck, and build before deploy"
        required: true
        type: boolean
        default: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SHEETFLARE_STAGING_GOOGLE_PRIVATE_KEY: ${{ secrets.SHEETFLARE_STAGING_GOOGLE_PRIVATE_KEY }}
      SHEETFLARE_STAGING_ADMIN_BEARER_TOKEN: ${{ secrets.SHEETFLARE_STAGING_ADMIN_BEARER_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate repo
        if: ${{ inputs.run_checks }}
        run: |
          npm run lint
          npm test
          npm run typecheck
          npm run build

      - name: Write staging secrets file
        run: |
          node -e "const fs = require('fs'); const secrets = { GOOGLE_PRIVATE_KEY: process.env.SHEETFLARE_STAGING_GOOGLE_PRIVATE_KEY, ADMIN_BEARER_TOKEN: process.env.SHEETFLARE_STAGING_ADMIN_BEARER_TOKEN }; if (!secrets.GOOGLE_PRIVATE_KEY || !secrets.ADMIN_BEARER_TOKEN) { throw new Error('Missing required staging deploy secrets.'); } fs.writeFileSync('.wrangler-staging-secrets.json', JSON.stringify(secrets));"

      - name: Deploy staging worker
        run: npx wrangler@4.85.0 deploy --config apps/api/wrangler.staging.jsonc --secrets-file .wrangler-staging-secrets.json

      - name: Remove staging secrets file
        if: ${{ always() }}
        run: rm -f .wrangler-staging-secrets.json
