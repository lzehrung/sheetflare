name: Deploy Admin Staging

on:
  workflow_dispatch:
    inputs:
      run_checks:
        description: "Run lint, tests, typecheck, and build before deploy"
        required: true
        type: boolean
        default: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SHEETFLARE_STAGING_ADMIN_UI_PASSWORD: ${{ secrets.SHEETFLARE_STAGING_ADMIN_UI_PASSWORD }}
      SHEETFLARE_STAGING_ADMIN_UI_USERNAME: ${{ secrets.SHEETFLARE_STAGING_ADMIN_UI_USERNAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate repo
        if: ${{ inputs.run_checks }}
        run: |
          npm run lint
          npm test
          npm run typecheck
          npm run build

      - name: Build admin app
        run: npm --workspace @sheetflare/admin run build

      - name: Upload Pages auth username
        run: printf "%s" "$SHEETFLARE_STAGING_ADMIN_UI_USERNAME" | npx wrangler@4.85.0 pages secret put ADMIN_UI_USERNAME --project-name sheetflare-staging-admin

      - name: Upload Pages auth password
        run: printf "%s" "$SHEETFLARE_STAGING_ADMIN_UI_PASSWORD" | npx wrangler@4.85.0 pages secret put ADMIN_UI_PASSWORD --project-name sheetflare-staging-admin

      - name: Deploy staging admin site
        run: npx wrangler@4.85.0 pages deploy apps/admin/dist --project-name sheetflare-staging-admin --branch main
